<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影片雙軌腳本編輯器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Microsoft JhengHei','PingFang TC',sans-serif;background:#f0efe9;color:#1a1a1a;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.toolbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:6px 14px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,0.06);z-index:100}
.toolbar-sep{width:1px;height:20px;background:#ddd;margin:0 2px;flex-shrink:0}
.toolbar-title{font-weight:700;font-size:14px;color:#333;margin-right:4px;white-space:nowrap}
button{font-family:inherit;cursor:pointer;border:1px solid #ccc;background:#fff;color:#1a1a1a;border-radius:6px;padding:4px 9px;font-size:12px;transition:background 0.12s;white-space:nowrap}
button:hover{background:#f0f0f0}
button.danger{border-color:#E24B4A;color:#E24B4A}
button.danger:hover{background:#fff0f0}
button.primary{background:#185FA5;color:#fff;border-color:#185FA5}
button.primary:hover{background:#0C447C}
button.active-panel{background:#eef2f8;border-color:#185FA5;color:#185FA5;font-weight:600}
.meta-bar{background:#fff;border-bottom:1px solid #e0e0e0;padding:7px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;flex-shrink:0}
.meta-field label{font-size:10px;color:#999;margin-bottom:2px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
input[type=text]{font-family:inherit;font-size:12px;border:1px solid #ddd;border-radius:5px;padding:4px 7px;background:#fff;color:#1a1a1a;width:100%}
input[type=text]:focus{outline:none;border-color:#185FA5}
.settings-bar{background:#f8f8f5;border-bottom:1px solid #e8e8e0;padding:6px 14px;display:flex;gap:14px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.settings-bar.hidden{display:none}
.settings-group{display:flex;align-items:center;gap:8px;font-size:12px;color:#555}
.settings-group label{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:12px;color:#444;user-select:none}
.settings-group input[type=checkbox]{width:13px;height:13px;cursor:pointer;accent-color:#185FA5}
.settings-sep{width:1px;height:16px;background:#ddd}
.total-duration{font-size:12px;font-weight:600;color:#185FA5;background:#eef2f8;border:1px solid #c5d8f5;border-radius:5px;padding:3px 9px;margin-left:auto}
.shot-shortcuts{background:#fafaf7;border-bottom:1px solid #ebebdf;padding:5px 14px;display:flex;gap:4px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.shot-shortcuts.hidden{display:none}
.shot-btn{font-size:11px;font-family:'Courier New',monospace;font-weight:700;padding:3px 8px;background:#fff;border:1px solid #d0d0c0;color:#445;border-radius:4px}
.shot-btn:hover{background:#185FA5;color:#fff;border-color:#185FA5}
.shot-label{font-size:11px;color:#aaa;margin-right:4px;flex-shrink:0}
.workspace{display:flex;flex:1;overflow:hidden}
.sidebar{width:300px;min-width:260px;max-width:440px;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;flex-shrink:0;transition:width 0.2s,min-width 0.2s;overflow:hidden}
.sidebar.collapsed{width:0;min-width:0}
.sidebar-tabs{display:flex;border-bottom:1px solid #e0e0e0;flex-shrink:0;background:#fafafa}
.s-tab{flex:1;border:none;background:none;padding:9px 6px;font-size:12px;font-weight:500;color:#888;cursor:pointer;border-bottom:2px solid transparent}
.s-tab.active{color:#185FA5;border-bottom-color:#185FA5;background:#fff;font-weight:600}
.sidebar-panel{flex:1;overflow-y:auto;display:none;flex-direction:column}
.sidebar-panel.active{display:flex}
.ref-upload-zone{margin:10px;border:1.5px dashed #c5d8f5;border-radius:8px;padding:14px 10px;text-align:center;background:#f8faff;cursor:pointer;transition:border-color 0.15s;flex-shrink:0}
.ref-upload-zone:hover,.ref-upload-zone.drag-over{border-color:#185FA5;background:#eef3fc}
.ref-upload-zone p{font-size:11px;color:#888;line-height:1.7;pointer-events:none}
.ref-upload-zone strong{color:#185FA5;font-size:12px}
.ref-upload-zone input{display:none}
.ref-list{padding:0 10px 10px;display:flex;flex-direction:column;gap:7px;flex:1}
.ref-item{border:1px solid #e8e8e8;border-radius:7px;overflow:hidden;background:#fff}
.ref-item-header{display:flex;align-items:center;gap:7px;padding:7px 9px;background:#f8f8f8;border-bottom:1px solid #eee;cursor:pointer;user-select:none}
.ref-item-icon{font-size:15px;flex-shrink:0}
.ref-item-name{font-size:12px;font-weight:500;color:#333;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ref-item-del{border:none;background:none;color:#bbb;font-size:13px;cursor:pointer;padding:0 2px;flex-shrink:0}
.ref-item-del:hover{color:#E24B4A}
.ref-item-body{display:none;padding:8px}
.ref-item-body.open{display:block}
.ref-img{width:100%;height:auto;border-radius:4px;display:block;max-height:380px;object-fit:contain;background:#f0f0f0;cursor:zoom-in}
.ref-pdf-frame{width:100%;height:460px;border:none;border-radius:4px}
.ref-text-pre{font-size:11px;line-height:1.7;color:#444;white-space:pre-wrap;word-break:break-all;max-height:280px;overflow-y:auto;background:#f8f8f8;padding:8px;border-radius:4px;font-family:'Courier New',monospace}
.ref-empty{padding:20px;text-align:center;color:#bbb;font-size:12px;line-height:2}
.note-toolbar{display:flex;gap:5px;padding:7px 10px;border-bottom:1px solid #eee;background:#fafafa;flex-wrap:wrap;flex-shrink:0}
.note-fmt-btn{border:1px solid #ddd;background:#fff;color:#555;font-size:11px;padding:3px 7px;border-radius:4px;cursor:pointer}
.note-fmt-btn:hover{background:#f0f0f0;border-color:#185FA5;color:#185FA5}
.note-area{flex:1;overflow-y:auto;padding:10px}
.note-ta{width:100%;height:100%;min-height:200px;border:none;resize:none;font-size:13px;line-height:1.8;color:#1a1a1a;background:transparent;outline:none;font-family:inherit}
.note-tags-bar{padding:6px 10px;border-top:1px solid #eee;background:#fafafa;display:flex;gap:5px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.note-tag{font-size:11px;padding:2px 8px;border-radius:12px;background:#eef2f8;color:#185FA5;border:1px solid #c5d8f5;cursor:pointer;font-weight:500}
.note-add-tag{font-size:11px;color:#999;border:1px dashed #ddd;background:transparent;padding:2px 8px;border-radius:12px;cursor:pointer}
.note-add-tag:hover{color:#185FA5;border-color:#185FA5}
.note-word-count{font-size:10px;color:#bbb;margin-left:auto;align-self:center}
.resize-handle{width:4px;background:transparent;cursor:col-resize;flex-shrink:0;transition:background 0.15s}
.resize-handle:hover{background:#c5d8f5}
.editor-area{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.script-wrap{padding:14px 18px;max-width:1020px;margin:0 auto;width:100%}
/* 關鍵字高亮 */
.cell-wrap{position:relative;width:100%}
.cell-ta{width:100%;border:none;padding:7px 10px;font-size:14px;line-height:1.8;min-height:72px;background:transparent;color:transparent;caret-color:#1a1a1a;resize:none;font-family:inherit;position:relative;z-index:1}
.cell-ta:focus{outline:none}
.cell-ta::selection{background:rgba(24,95,165,0.2)}
.cell-highlight{position:absolute;top:0;left:0;width:100%;height:100%;padding:7px 10px;font-size:14px;line-height:1.8;pointer-events:none;white-space:pre-wrap;word-break:break-word;overflow:hidden;z-index:0;color:#1a1a1a}
.kw-vo{color:#1565C0;font-weight:600}
.kw-sfx{color:#E65100;font-weight:600}
.kw-bgm{color:#6A1B9A;font-weight:600}
.kw-char{color:#1B5E20;font-weight:600}
.kw-card{color:#BF360C;font-weight:600}
.kw-note{color:#4E342E;font-style:italic}
/* 表格 */
.script-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #ddd;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.script-table th{background:#eef2f8;padding:8px 10px;text-align:left;font-weight:600;font-size:12px;border-bottom:1px solid #ccd5e0;color:#445;white-space:nowrap}
.script-table td{border:1px solid #e8e8e8;vertical-align:top;padding:0}
.col-num{width:32px}
.col-act{width:30px}
.row-num-td{text-align:center;font-size:11px;color:#bbb;padding:6px 4px;vertical-align:top}
.type-sel{font-family:inherit;font-size:11px;border:none;background:transparent;color:#666;cursor:pointer;padding:5px 4px;width:100%;outline:none;font-weight:500}
.mini-input{font-family:inherit;font-size:12px;border:none;background:transparent;color:#333;padding:6px 6px;width:100%;outline:none;text-align:center}
.mini-input:focus{background:#f0f8ff;border-radius:3px}
.mini-input::placeholder{color:#ccc;font-size:11px}
.row-actions{background:#fafafa;border-left:1px solid #eee;text-align:center;vertical-align:top}
.row-act-btn{display:block;width:100%;border:none;background:transparent;color:#ccc;font-size:11px;padding:3px 0;cursor:pointer;line-height:1.5}
.row-act-btn:hover{color:#333;background:#f0f0f0}
.row-act-btn.del:hover{color:#E24B4A;background:#fff0f0}
.add-row-btn{margin-top:10px;font-size:12px}
/* 段落類型背景 */
tr.t-scene-cut{background:#f2f2f2}
tr.t-key-shot{background:#fffde7}
tr.t-sfx{background:#e8f4fd}
tr.t-note{background:#f0faf0}
tr.t-normal{background:#fff}
/* 章節列 */
tr.t-chapter{background:#1a1a1a}
tr.t-chapter td{border-color:#1a1a1a;padding:0}
.chapter-row-inner{display:flex;align-items:center;gap:10px;padding:10px 14px}
.chapter-input{flex:1;border:none;background:transparent;color:#fff;font-size:15px;font-weight:600;outline:none;letter-spacing:0.5px;font-family:inherit}
.chapter-input::placeholder{color:#555}
.chapter-badge{font-size:10px;color:#666;background:#333;padding:2px 7px;border-radius:10px;flex-shrink:0}
.chapter-act-btn{border:none;background:transparent;color:#555;font-size:11px;padding:3px 5px;cursor:pointer;border-radius:3px}
.chapter-act-btn:hover{background:#333;color:#fff}
/* 隱藏欄位 */
.col-scene-th,.col-scene-td,.col-shot-th,.col-shot-td,.col-dur-th,.col-dur-td{display:none}
.show-scene .col-scene-th,.show-scene .col-scene-td{display:table-cell}
.show-shot .col-shot-th,.show-shot .col-shot-td{display:table-cell}
.show-dur .col-dur-th,.show-dur .col-dur-td{display:table-cell}
.col-type-th,.col-type-td{display:none}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;padding:24px;max-width:760px;width:100%;border:1px solid #ddd;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px;color:#1a1a1a}
.modal-close{float:right;border:none;background:none;font-size:20px;cursor:pointer;color:#aaa;line-height:1}
.modal-close:hover{color:#333}
.import-tab{border:none;border-bottom:2px solid transparent;background:none;padding:7px 14px;font-size:13px;color:#888;cursor:pointer;border-radius:0}
.import-tab.active{border-bottom:2px solid #185FA5;color:#185FA5;font-weight:600}
.guide-section{margin-bottom:18px}
.guide-section h3{font-size:13px;font-weight:600;color:#185FA5;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid #e8eef6}
.guide-section p,.guide-section li{font-size:13px;line-height:1.9;color:#555}
.guide-section ul{padding-left:18px}
.guide-section ul ul{margin-top:4px}
.guide-section code{background:#f0f0f0;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px;color:#c0392b}
.template-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.info-box{background:#f0f5ff;border:1px solid #c5d8f5;border-radius:6px;padding:9px 11px;margin-bottom:11px;font-size:12px;color:#224;line-height:1.9}
.warn-box{background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:10px 13px;font-size:13px;color:#7a5500;line-height:1.8}
.preview-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.preview-table th{padding:5px 8px;border:1px solid #ddd;background:#eef2f8;text-align:left;font-weight:600}
.preview-table td{padding:5px 8px;border:1px solid #eee;vertical-align:top;white-space:pre-wrap;max-width:240px;word-break:break-all}
textarea{font-family:inherit;font-size:13px;border:1px solid #ccc;border-radius:6px;padding:5px 8px;background:#fff;color:#1a1a1a;width:100%;resize:none;line-height:1.7}
textarea:focus{outline:none;border-color:#185FA5}
.export-mode-radio{display:flex;gap:12px;margin:10px 0 14px;flex-wrap:wrap}
.export-mode-radio label{display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;color:#333;padding:9px 12px;border:1px solid #ddd;border-radius:8px;flex:1;min-width:160px}
.export-mode-radio label.selected{border-color:#185FA5;background:#f0f5ff}
.export-mode-radio input[type=radio]{margin-top:2px;accent-color:#185FA5;flex-shrink:0}
.export-col-checks{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0 14px;font-size:13px}
.export-col-checks label{display:flex;align-items:center;gap:5px;cursor:pointer}
.status{position:fixed;bottom:16px;right:16px;background:#185FA5;color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;box-shadow:0 4px 12px rgba(24,95,165,0.3)}
.status.show{opacity:1}
/* 自動編號 modal */
.num-option{display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;margin-bottom:8px}
.num-option.selected{border-color:#185FA5;background:#f0f5ff}
.num-option input{margin-top:2px;accent-color:#185FA5;flex-shrink:0}
@media print{
  .toolbar,.meta-bar,.settings-bar,.shot-shortcuts,.row-actions,.status,.add-row-btn,.sidebar,.resize-handle{display:none!important}
  body{height:auto;overflow:auto;background:#fff}
  .workspace{display:block}
  .editor-area{overflow:visible}
  .script-wrap{padding:0;max-width:100%}
  .script-table{border:1pt solid #888!important;border-radius:0;box-shadow:none;page-break-inside:auto}
  .script-table th{background:#e8e8e8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;font-size:10pt}
  .script-table tr{page-break-inside:avoid}
  .cell-ta{font-size:10.5pt;min-height:unset;padding:6px 8px;color:#1a1a1a!important}
  .cell-highlight{display:none}
  .mini-input{font-size:10pt}
  .type-sel{font-size:10pt}
  .print-header{display:block!important;margin-bottom:12pt;font-size:9pt;padding-bottom:5pt;border-bottom:1pt solid #bbb;color:#333}
  tr.t-scene-cut{background:#f0f0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  tr.t-key-shot{background:#fffde7!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  tr.t-sfx{background:#e8f4fd!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  tr.t-note{background:#f0faf0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  tr.t-chapter{background:#1a1a1a!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .chapter-input{color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body.print-proposal-mode .script-table{border:none!important}
  body.print-proposal-mode .script-table th,body.print-proposal-mode .script-table td{border:none!important;border-bottom:1pt solid #ddd!important}
  body.print-proposal-mode .script-table th{font-size:13pt;padding:10pt 12pt;border-bottom:2pt solid #333!important}
  body.print-proposal-mode .cell-ta{font-size:13pt;line-height:2.1;padding:10pt 12pt}
}
.print-header{display:none}
</style>
</head>
<body>
<div class="toolbar">
  <span class="toolbar-title">&#x1F3AC; 影片雙軌腳本編輯器</span>
  <div class="toolbar-sep"></div>
  <button onclick="addRow()">＋ 新增列</button>
  <button onclick="deleteSelectedRow()" class="danger">✕ 刪除</button>
  <button onclick="moveSelectedRow(-1)">▲ 上移</button>
  <button onclick="moveSelectedRow(1)">▼ 下移</button>
  <div class="toolbar-sep"></div>
  <button onclick="newProject()" title="開新專案">🆕 新專案</button>
  <button onclick="clearAllRows()" class="danger" title="清空所有腳本列">🗑 清空</button>
  <div class="toolbar-sep"></div>
  <button onclick="saveManual()">💾 儲存</button>
  <button onclick="showImportModal()">📥 匯入</button>
  <button onclick="exportJSON()">↓ JSON</button>
  <div class="toolbar-sep"></div>
  <button onclick="showExportModal('pdf')" class="primary">🖨 PDF</button>
  <button onclick="showExportModal('docx')" class="primary">📄 Word</button>
  <div class="toolbar-sep"></div>
  <button onclick="showGuide()">？ 指南</button>
  <button onclick="showTemplates()">📋 範本</button>
  <div class="toolbar-sep"></div>
  <button id="btnSettings" onclick="toggleSettings()">⚙ 進階</button>
  <button id="btnSidebar" onclick="toggleSidebar()" class="active-panel">◀ 側欄</button>
</div>
<div class="meta-bar" id="metaBar"></div>
<div class="settings-bar hidden" id="settingsBar">
  <div class="settings-group">
    <strong style="font-size:11px;color:#888;margin-right:2px">欄位：</strong>
    <label><input type="checkbox" id="ckScene" onchange="toggleCol('scene',this.checked)"> 場次</label>
    <label><input type="checkbox" id="ckShot" onchange="toggleCol('shot',this.checked)"> 鏡號</label>
    <label><input type="checkbox" id="ckDur" onchange="toggleCol('dur',this.checked)"> 時間</label>
    <label><input type="checkbox" id="ckType" onchange="toggleTypeCol(this.checked)"> 段落類型</label>
    <button onclick="showAutoNumberModal()" style="font-size:11px;padding:3px 9px;margin-left:4px">⟳ 自動編號</button>
  </div>
  <div class="settings-sep"></div>
  <div class="settings-group">
    <strong style="font-size:11px;color:#888;margin-right:2px">顯示：</strong>
    <label><input type="checkbox" id="ckHighlight" onchange="toggleHighlight(this.checked)" checked> 關鍵字標色</label>
  </div>
  <div class="settings-sep"></div>
  <div class="settings-group">
    <strong style="font-size:11px;color:#888;margin-right:2px">章節：</strong>
    <button onclick="insertChapterRow()" style="font-size:11px;padding:3px 9px">＋ 插入章節標題</button>
  </div>
  <div class="settings-sep"></div>
  <div class="settings-group">
    <strong style="font-size:11px;color:#888;margin-right:2px">鏡頭語言：</strong>
    <label><input type="checkbox" id="ckShots" onchange="toggleShotBar(this.checked)"> 快捷按鈕</label>
  </div>
  <span class="total-duration" id="totalDuration" style="display:none">總時長：--</span>
</div>
<div class="shot-shortcuts hidden" id="shotBar">
  <span class="shot-label">插入：</span>
  <button class="shot-btn" onclick="insertShot('ECU')">ECU</button>
  <button class="shot-btn" onclick="insertShot('CU')">CU</button>
  <button class="shot-btn" onclick="insertShot('MCU')">MCU</button>
  <button class="shot-btn" onclick="insertShot('MS')">MS</button>
  <button class="shot-btn" onclick="insertShot('WS')">WS</button>
  <button class="shot-btn" onclick="insertShot('EWS')">EWS</button>
  <button class="shot-btn" onclick="insertShot('PAN')">PAN</button>
  <button class="shot-btn" onclick="insertShot('TILT')">TILT</button>
  <button class="shot-btn" onclick="insertShot('DOLLY')">DOLLY</button>
  <button class="shot-btn" onclick="insertShot('ZOOM IN')">ZOOM IN</button>
  <button class="shot-btn" onclick="insertShot('ZOOM OUT')">ZOOM OUT</button>
  <button class="shot-btn" onclick="insertShot('RACK FOCUS')">RACK FOCUS</button>
  <button class="shot-btn" onclick="insertShot('HANDHELD')">HANDHELD</button>
  <button class="shot-btn" onclick="insertShot('POV')">POV</button>
  <button class="shot-btn" onclick="insertShot('OTS')">OTS</button>
  <button class="shot-btn" onclick="insertShot('B-ROLL')">B-ROLL</button>
  <button class="shot-btn" onclick="insertShot('CUTAWAY')">CUTAWAY</button>
</div>
<div class="workspace">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-tabs">
      <button class="s-tab active" id="stab-ref" onclick="switchSTab('ref')">📎 參考資料</button>
      <button class="s-tab" id="stab-note" onclick="switchSTab('note')">💡 靈感筆記</button>
    </div>
    <div class="sidebar-panel active" id="spanel-ref">
      <div class="ref-upload-zone" id="refDropZone"
        onclick="document.getElementById('refFileInput').click()"
        ondragover="refDragOver(event)" ondragleave="refDragLeave(event)" ondrop="refDrop(event)">
        <input type="file" id="refFileInput" multiple

        <button class="note-fmt-btn" onclick="noteInsert('### ')">H3</button>
        <button class="note-fmt-btn" onclick="noteWrap('**','**')"><b>B</b></button>
        <button class="note-fmt-btn" onclick="noteWrap('_','_')"><i>I</i></button>
        <button class="note-fmt-btn" onclick="noteInsert('- ')">• 列表</button>
        <button class="note-fmt-btn" onclick="noteInsert('[ ] ')">☐ 待辦</button>

      </div>

        <textarea class="note-ta" id="noteTa"
          placeholder="記錄靈感、客戶要求、待辦事項…"
          oninput="saveNote();updateNoteCount()"></textarea>

      <div class="note-tags-bar">
        <span style="font-size:11px;color:#aaa;flex-shrink:0">標籤：</span>
        <div id="tagsList"></div>
        <button class="note-add-tag" onclick="addNoteTag()">＋ 標籤</button>

        <thead id="scriptHead"></thead>

<div id="modalContainer"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ============================================================
// ALL JS IN ONE BLOCK - syntax verified
// ============================================================

// --- Global state ---
var scriptDoc = {title:'',project:'',author:'',version:'v1.0',date:new Date().toLocaleDateString('zh-TW'),notes:'',rows:[{id:uid(),type:'normal',scene:'',shot:'',duration:'',left:'',right:''}]};
var colSettings = {scene:false,shot:false,dur:false,type:false,shotBar:false,highlight:true};
var selectedRow = null;
var lastFocusedLeftTA = null;
var pendingPasteRows = [];
var pendingDocxRows = [];
var refItems = [];
var noteTags = [];
var sidebarOpen = true;
var settingsOpen = false;
var DB = null;

// --- Undo / Redo 堆疊（管理結構性操作：新增/刪除/移動/複製列等）---
var undoStack = [];   // 每個元素是 rows 的 JSON 字串快照
var redoStack = [];
var MAX_UNDO = 100;

// 在結構性操作「之前」呼叫，儲存當前 rows 快照
function pushUndo(){
  undoStack.push(JSON.stringify(scriptDoc.rows));
  if(undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = []; // 新操作清掉 redo
}

function doUndo(){
  if(!undoStack.length){ showStatus('沒有可復原的操作',1000); return; }
  redoStack.push(JSON.stringify(scriptDoc.rows));
  scriptDoc.rows = JSON.parse(undoStack.pop());
  saveDoc(); renderBody();
  showStatus('已復原 ↩',900);
}

function doRedo(){
  if(!redoStack.length){ showStatus('沒有可重做的操作',1000); return; }
  undoStack.push(JSON.stringify(scriptDoc.rows));
  scriptDoc.rows = JSON.parse(redoStack.pop());
  saveDoc(); renderBody();
  showStatus('已重做 ↪',900);
}

// 全域鍵盤監聽：Ctrl/⌘+Z / Ctrl/⌘+Y / Ctrl/⌘+Shift+Z
document.addEventListener('keydown', function(e){
  var isMeta = e.ctrlKey || e.metaKey;
  if(!isMeta) return;

  var isUndo = (e.key === 'z' && !e.shiftKey);
  var isRedo = (e.key === 'y' || (e.key === 'z' && e.shiftKey));
  if(!isUndo && !isRedo) return;

  if(isUndo){
    if(undoStack.length > 0){
      // 有結構性歷史：攔截並執行結構性 undo
      e.preventDefault();
      doUndo();
    }
    // 沒有結構性歷史：不攔截，讓瀏覽器處理文字 undo
  }
  if(isRedo){
    if(redoStack.length > 0){
      e.preventDefault();
      doRedo();
    }
  }
});

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function escHtml(s){
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/\x3C/g,'&lt;')
    .replace(/\x3E/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// --- IndexedDB ---
function initDB(){
  return new Promise(function(res){
    var req = indexedDB.open('tw_script_refs',1);
    req.onupgradeneeded = function(e){ e.target.result.createObjectStore('files',{keyPath:'id'}); };
    req.onsuccess = function(e){ DB = e.target.result; res(); };
    req.onerror = function(){ res(); };
  });
}
function dbSave(id,data){ if(!DB)return; DB.transaction('files','readwrite').objectStore('files').put({id:id,data:data}); }
function dbGet(id){
  return new Promise(function(res){
    if(!DB){res(null);return;}
    var r = DB.transaction('files','readonly').objectStore('files').get(id);
    r.onsuccess = function(e){ res(e.target.result ? e.target.result.data : null); };
    r.onerror = function(){ res(null); };
  });
}
function dbDelete(id){ if(!DB)return; DB.transaction('files','readwrite').objectStore('files').delete(id); }

// --- Save / Load ---
function loadDoc(){
  try{
    var s = localStorage.getItem('tw_script_doc');
    if(s){ var d = JSON.parse(s); if(d&&d.rows){ d.rows = d.rows.map(function(r){ return Object.assign({type:'normal',scene:'',shot:'',duration:'',chapter:''},r); }); scriptDoc = d; }}
  }catch(e){}
  try{
    var cs = localStorage.getItem('tw_col_settings');
    if(cs) colSettings = Object.assign({scene:false,shot:false,dur:false,type:false,shotBar:false,highlight:true}, JSON.parse(cs));
  }catch(e){}
}
function saveDoc(){ localStorage.setItem('tw_script_doc', JSON.stringify(scriptDoc)); showStatus('已自動儲存'); }
function saveColSettings(){ localStorage.setItem('tw_col_settings', JSON.stringify(colSettings)); }
function saveManual(){ saveDoc(); showStatus('已儲存 ✓',1000); }

function loadRefMeta(){
  try{ var s = localStorage.getItem('tw_ref_meta'); if(s) refItems = JSON.parse(s)||[]; }catch(e){}
}
function saveRefMeta(){
  localStorage.setItem('tw_ref_meta', JSON.stringify(refItems.map(function(r){ return {id:r.id,name:r.name,type:r.type,size:r.size,mime:r.mime,expanded:r.expanded}; })));
}
function loadNote(){
  var n = localStorage.getItem('tw_note')||'';
  try{ noteTags = JSON.parse(localStorage.getItem('tw_note_tags')||'[]'); }catch(e){ noteTags = []; }
  document.getElementById('noteTa').value = n;
  updateNoteCount();
  renderTags();
}
function saveNote(){ localStorage.setItem('tw_note', document.getElementById('noteTa').value); }
function updateNoteCount(){
  var v = document.getElementById('noteTa').value;
  document.getElementById('noteWordCount').textContent = v.replace(/\s/g,'').length + ' 字';
}

function showStatus(msg,d){
  d = d||1400;
  var s = document.getElementById('status');
  s.textContent = msg; s.classList.add('show');
  clearTimeout(s._t); s._t = setTimeout(function(){ s.classList.remove('show'); }, d);
}

// --- Settings / Column toggles ---
function toggleSettings(){
  settingsOpen = !settingsOpen;
  document.getElementById('settingsBar').classList.toggle('hidden', !settingsOpen);
  document.getElementById('btnSettings').classList.toggle('active-panel', settingsOpen);
}
function applyColSettings(){
  var tbl = document.getElementById('mainTable');
  tbl.classList.toggle('show-scene', colSettings.scene);
  tbl.classList.toggle('show-shot', colSettings.shot);
  tbl.classList.toggle('show-dur', colSettings.dur);
  document.querySelectorAll('.col-type-td,.col-type-th').forEach(function(el){ el.style.display = colSettings.type ? '' : 'none'; });
  var td = document.getElementById('totalDuration');
  if(td) td.style.display = colSettings.dur ? 'inline-block' : 'none';
  if(colSettings.dur) updateTotalDuration();
  var ckScene = document.getElementById('ckScene'); if(ckScene) ckScene.checked = colSettings.scene;
  var ckShot = document.getElementById('ckShot'); if(ckShot) ckShot.checked = colSettings.shot;
  var ckDur = document.getElementById('ckDur'); if(ckDur) ckDur.checked = colSettings.dur;
  var ckType = document.getElementById('ckType'); if(ckType) ckType.checked = colSettings.type;
  var ckShots = document.getElementById('ckShots'); if(ckShots) ckShots.checked = colSettings.shotBar;
  var ckHl = document.getElementById('ckHighlight'); if(ckHl) ckHl.checked = colSettings.highlight;
}
function toggleCol(col,val){ colSettings[col] = val; saveColSettings(); applyColSettings(); }
function toggleTypeCol(val){ colSettings.type = val; saveColSettings(); applyColSettings(); }
function toggleShotBar(val){
  colSettings.shotBar = val;
  document.getElementById('shotBar').classList.toggle('hidden', !val);
  saveColSettings();
}
function toggleHighlight(val){
  colSettings.highlight = val;
  saveColSettings();
  if(val){
    // 開啟：非聚焦狀態的 textarea 顯示高亮
    document.querySelectorAll('.cell-ta').forEach(function(ta){
      if(document.activeElement !== ta) ta.style.color = 'transparent';
    });
    document.querySelectorAll('.cell-highlight').forEach(function(hl){
      var ta = hl.parentNode && hl.parentNode.querySelector('.cell-ta');
      if(ta && document.activeElement !== ta) hl.style.visibility = 'visible';
    });
  } else {
    // 關閉：所有 textarea 顯示真實文字，隱藏高亮層
    document.querySelectorAll('.cell-ta').forEach(function(ta){ ta.style.color = '#1a1a1a'; });
    document.querySelectorAll('.cell-highlight').forEach(function(hl){ hl.style.visibility = 'hidden'; });
  }
}

// --- Duration ---
function parseDuration(s){
  s = String(s||'').trim();
  if(!s) return 0;
  if(/^\d+$/.test(s)) return parseInt(s,10);
  if(/^\d+s$/i.test(s)) return parseInt(s,10);
  var mm = s.match(/^(\d+):(\d+)$/);
  if(mm) return parseInt(mm[1],10)*60 + parseInt(mm[2],10);
  return 0;
}
function formatDuration(sec){
  if(!sec) return '00:00';
  var m = Math.floor(sec/60), s = sec%60;
  return (m<10?'0':'') + m + ':' + (s<10?'0':'') + s;
}
function updateTotalDuration(){
  var total = 0;
  scriptDoc.rows.forEach(function(r){ total += parseDuration(r.duration); });
  var el = document.getElementById('totalDuration');
  if(el) el.textContent = '總時長：' + formatDuration(total) + (total ? ' (' + total + 's)' : '');
}

// --- Meta bar ---
function renderMeta(){
  var mb = document.getElementById('metaBar');
  var fields = [{k:'title',l:'腳本標題',ph:'輸入標題…'},{k:'project',l:'專案名稱',ph:'專案名稱…'},{k:'author',l:'作者',ph:'姓名…'},{k:'version',l:'版本',ph:'v1.0'},{k:'date',l:'日期',ph:'日期…'},{k:'notes',l:'備註',ph:'備註…'}];
  mb.innerHTML = fields.map(function(f){
    return '<div class="meta-field"><label>' + f.l + '</label><input type="text" value="' + escHtml(scriptDoc[f.k]||'') + '" placeholder="' + f.ph + '" data-key="' + f.k + '" oninput="updateMeta(this)"></div>';
  }).join('');
}
function updateMeta(el){ scriptDoc[el.dataset.key] = el.value; saveDoc(); }

// --- Table head ---
var ROW_TYPES = [{v:'normal',l:'一般'},{v:'scene-cut',l:'場景切換'},{v:'key-shot',l:'重點鏡頭'},{v:'sfx',l:'音效提示'},{v:'note',l:'備註'}];
function renderHead(){
  document.getElementById('scriptHead').innerHTML =
    '<tr>' +
    '<th class="col-num">#</th>' +
    '<th class="col-type-th" style="display:none;width:88px">類型</th>' +
    '<th class="col-scene-th" style="width:58px">場次</th>' +
    '<th class="col-shot-th" style="width:58px">鏡號</th>' +
    '<th class="col-dur-th" style="width:58px">時間</th>' +
    '<th style="width:55%">畫面</th>' +
    '<th style="width:45%">聲音／字幕</th>' +
    '<th class="col-act" style="width:30px"></th>' +
    '</tr>';
}

// --- Keyword highlight ---
function applyHighlight(text, side){
  if(!text) return '';
  var lines = String(text).split('\n');
  return lines.map(function(line){
    var e = escHtml(line);
    if(!e) return '';
    if(side === 'right'){
      e = e.replace(/^(VO：|旁白：|VO:)/,function(m){ return '<span class="kw-vo">' + m + '</span>'; });
      e = e.replace(/^(SFX：|音效：|SFX:)/,function(m){ return '<span class="kw-sfx">' + m + '</span>'; });
      e = e.replace(/^(BGM：|音樂：|BGM:)/,function(m){ return '<span class="kw-bgm">' + m + '</span>'; });
      e = e.replace(/^(字卡：|字幕：)/,function(m){ return '<span class="kw-card">' + m + '</span>'; });
      e = e.replace(/(【[^】]*】)/g,function(m){ return '<span class="kw-note">' + m + '</span>'; });
      if(!/kw-vo|kw-sfx|kw-bgm|kw-card/.test(e)){
        e = e.replace(/^([^\s\x3C]{1,10}(?:：|:))/,function(m){ return '<span class="kw-char">' + m + '</span>'; });
      }
    } else {
      e = e.replace(/(【[^】]*】)/g,function(m){ return '<span class="kw-note">' + m + '</span>'; });
    }
    return e;
  }).join('\n');
}

// --- Build row ---
function renderBody(){
  var tbody = document.getElementById('scriptBody');
  tbody.innerHTML = '';
  scriptDoc.rows.forEach(function(row,i){ buildRow(row, i, tbody); });
  applyColSettings();
  if(colSettings.dur) updateTotalDuration();
}

function buildRow(row, i, tbody){
  var tr = document.createElement('tr');
  tr.dataset.id = row.id;

  // Chapter row
  if(row.type === 'chapter'){
    tr.className = 't-chapter';
    var totalCols = 2 + (colSettings.type?1:0) + (colSettings.scene?1:0) + (colSettings.shot?1:0) + (colSettings.dur?1:0) + 1 + 1;
    tr.innerHTML =
      '<td colspan="' + totalCols + '" style="padding:0">' +
      '<div class="chapter-row-inner">' +
      '<span style="font-size:13px;color:#aaa">▍</span>' +
      '<input class="chapter-input" data-id="' + row.id + '" value="' + escHtml(row.chapter||'') + '" placeholder="輸入章節標題…" oninput="updateChapter(this)">' +
      '<span class="chapter-badge">章節</span>' +
      '<button class="chapter-act-btn" onclick="moveRow(\'' + row.id + '\',-1)" title="上移">▲</button>' +
      '<button class="chapter-act-btn" onclick="moveRow(\'' + row.id + '\',1)" title="下移">▼</button>' +
      '<button class="chapter-act-btn" onclick="deleteRow(\'' + row.id + '\')" title="刪除" style="color:#E24B4A">✕</button>' +
      '</div></td>';
    tbody.appendChild(tr);
    return;
  }

  // Normal row
  tr.className = 't-' + (row.type||'normal');
  if(selectedRow === row.id) tr.classList.add('row-selected');

  var typeOpts = ROW_TYPES.map(function(t){ return '<option value="' + t.v + '"' + (row.type===t.v?' selected':'') + '>' + t.l + '</option>'; }).join('');

  var hlOn = colSettings.highlight;
  var taColor = hlOn ? 'transparent' : '#1a1a1a';

  function makeCellWrap(text, side, ph){
    var hlHtml = hlOn ? applyHighlight(text, side) : escHtml(text);
    return '<div class="cell-wrap">' +
      '<div class="cell-highlight" style="' + (hlOn?'':'display:none') + '">' + hlHtml + '</div>' +
      '<textarea class="cell-ta" data-id="' + row.id + '" data-side="' + side + '" rows="3" placeholder="' + ph + '" style="color:' + taColor + '">' + escHtml(text||'') + '</textarea>' +
      '</div>';
  }

  tr.innerHTML =
    '<td class="row-num-td">' + (i+1) + '</td>' +
    '<td class="col-type-td" style="' + (colSettings.type?'':'display:none') + ';vertical-align:top;padding:0">' +
      '<select class="type-sel" data-id="' + row.id + '" onchange="updateRowType(this)">' + typeOpts + '</select>' +
    '</td>' +
    '<td class="col-scene-td" style="vertical-align:top;padding:0"><input class="mini-input" data-id="' + row.id + '" data-field="scene" value="' + escHtml(row.scene||'') + '" placeholder="S1" oninput="updateRowField(this)"></td>' +
    '<td class="col-shot-td" style="vertical-align:top;padding:0"><input class="mini-input" data-id="' + row.id + '" data-field="shot" value="' + escHtml(row.shot||'') + '" placeholder="01" oninput="updateRowField(this)"></td>' +
    '<td class="col-dur-td" style="vertical-align:top;padding:0"><input class="mini-input" data-id="' + row.id + '" data-field="duration" value="' + escHtml(row.duration||'') + '" placeholder="3s" oninput="updateRowField(this);updateTotalDuration()"></td>' +
    '<td style="vertical-align:top;padding:0">' + makeCellWrap(row.left,'left','畫面說明、場景、鏡頭…') + '</td>' +
    '<td style="vertical-align:top;padding:0">' + makeCellWrap(row.right,'right','旁白、台詞、音效、字幕文字…') + '</td>' +
    '<td class="row-actions" style="width:30px">' +
      '<button class="row-act-btn" onclick="moveRow(\'' + row.id + '\',-1)" title="上移">▲</button>' +
      '<button class="row-act-btn" onclick="moveRow(\'' + row.id + '\',1)" title="下移">▼</button>' +
      '<button class="row-act-btn" onclick="copyRow(\'' + row.id + '\')" title="複製">⧉</button>' +
      '<button class="row-act-btn del" onclick="deleteRow(\'' + row.id + '\')" title="刪除">✕</button>' +
    '</td>';

  tbody.appendChild(tr);

  // Textarea events
  tr.querySelectorAll('textarea.cell-ta').forEach(function(ta){
    autoResize(ta);
    ta.addEventListener('input', function(){
      var r = scriptDoc.rows.find(function(r){ return r.id === ta.dataset.id; });
      if(r){
        r[ta.dataset.side === 'left' ? 'left' : 'right'] = ta.value;
        autoResize(ta);
        saveDoc();
      }
    });
    ta.addEventListener('keydown', function(e){
      var idx = scriptDoc.rows.findIndex(function(r){ return r.id === ta.dataset.id; });

      if(e.key === 'Enter' && !e.shiftKey){
        var val = ta.value;
        var pos = ta.selectionStart;
        // 只有游標在整段文字最末端才跳格或新增列，其他位置執行原生換行
        var cursorAtVeryEnd = (pos === val.length && ta.selectionEnd === val.length);
        if(cursorAtVeryEnd){
          e.preventDefault();
          if(ta.dataset.side === 'left'){
            var rt = tr.querySelectorAll('textarea')[1]; if(rt) rt.focus();
          } else {
            addRowAfter(idx);
            setTimeout(function(){ var rows = document.querySelectorAll('.cell-ta[data-side="left"]'); if(rows[idx+1]) rows[idx+1].focus(); }, 50);
          }
        }
        // 游標不在末端：不攔截，讓瀏覽器換行
      }

      if(e.key === 'Tab'){
        e.preventDefault();
        if(ta.dataset.side === 'left'){ var rt = tr.querySelectorAll('textarea')[1]; if(rt) rt.focus(); }
        else{ var next = document.querySelectorAll('.cell-ta[data-side="left"]')[idx+1]; if(next) next.focus(); }
      }
    });
    ta.addEventListener('focus', function(){
      selectedRow = ta.dataset.id; renderHighlight();
      if(ta.dataset.side === 'left') lastFocusedLeftTA = ta;
      // 聚焦時顯示真實文字、隱藏高亮層，讓瀏覽器 undo/redo 完全正常運作
      ta.style.color = '#1a1a1a';
      var hl = ta.parentNode && ta.parentNode.querySelector('.cell-highlight');
      if(hl) hl.style.visibility = 'hidden';
    });
    ta.addEventListener('blur', function(){
      // 失焦時更新高亮層並顯示，文字恢復透明
      if(colSettings.highlight){
        var hl = ta.parentNode && ta.parentNode.querySelector('.cell-highlight');
        if(hl){
          hl.innerHTML = applyHighlight(ta.value, ta.dataset.side);
          hl.style.visibility = 'visible';
        }
        ta.style.color = 'transparent';
      }
    });
    ta.addEventListener('scroll', function(){ var hl = ta.parentNode && ta.parentNode.querySelector('.cell-highlight'); if(hl) hl.scrollTop = ta.scrollTop; });
  });
}

function renderHighlight(){ document.querySelectorAll('tr[data-id]').forEach(function(tr){ tr.classList.toggle('row-selected', tr.dataset.id === selectedRow); }); }
function autoResize(ta){ ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }

// --- Row operations ---
function addRow(){
  pushUndo();
  scriptDoc.rows.push({id:uid(),type:'normal',scene:'',shot:'',duration:'',left:'',right:''});
  saveDoc(); renderBody();
  var tas = document.querySelectorAll('.cell-ta[data-side="left"]');
  if(tas.length) tas[tas.length-1].focus();
}
function addRowAfter(idx){ pushUndo(); scriptDoc.rows.splice(idx+1, 0, {id:uid(),type:'normal',scene:'',shot:'',duration:'',left:'',right:''}); saveDoc(); renderBody(); }
function deleteRow(id){ if(scriptDoc.rows.length<=1){showStatus('至少保留一列');return;} pushUndo(); scriptDoc.rows = scriptDoc.rows.filter(function(r){ return r.id !== id; }); saveDoc(); renderBody(); }
function moveRow(id,dir){ var i = scriptDoc.rows.findIndex(function(r){ return r.id===id; }); var j = i+dir; if(j<0||j>=scriptDoc.rows.length)return; pushUndo(); var tmp=scriptDoc.rows[i]; scriptDoc.rows[i]=scriptDoc.rows[j]; scriptDoc.rows[j]=tmp; saveDoc(); renderBody(); }
function copyRow(id){ var i = scriptDoc.rows.findIndex(function(r){ return r.id===id; }); pushUndo(); scriptDoc.rows.splice(i+1, 0, Object.assign({}, scriptDoc.rows[i], {id:uid()})); saveDoc(); renderBody(); }
function deleteSelectedRow(){ if(selectedRow) deleteRow(selectedRow); else showStatus('請先點選要刪除的列'); }

function selectNumOpt(val){
  ['keep','chapter','reset'].forEach(function(k){ document.getElementById('nopt-'+k).classList.toggle('selected', k===val); });
  var radio = document.querySelector('input[name="sceneMode"][value="'+val+'"]');
  if(radio) radio.checked = true;
}

function runAutoNumber(){
  var sceneMode = 'keep';
  document.querySelectorAll('input[name="sceneMode"]').forEach(function(r){ if(r.checked) sceneMode = r.value; });
  var sceneFmt = 'alpha';
  document.querySelectorAll('input[name="sceneFmt"]').forEach(function(r){ if(r.checked) sceneFmt = r.value; });
  var shotFmt = '2digit';
  document.querySelectorAll('input[name="shotFmt"]').forEach(function(r){ if(r.checked) shotFmt = r.value; });

  function sceneLabel(idx){
    if(sceneFmt === 'numeric') return 'S' + (idx+1);
    var s='', n=idx;
    do{ s = String.fromCharCode(65+(n%26)) + s; n = Math.floor(n/26)-1; }while(n>=0);
    return s;
  }
  function shotLabel(n){ if(shotFmt==='3digit') return String(n).padStart(3,'0'); if(shotFmt==='plain') return String(n); return String(n).padStart(2,'0'); }

  if(sceneMode === 'reset'){
    pushUndo();
    var sc = sceneLabel(0), shotIdx = 1;
    scriptDoc.rows.forEach(function(row){ if(row.type==='chapter')return; row.scene=sc; row.shot=shotLabel(shotIdx++); });
  } else if(sceneMode === 'chapter'){
    pushUndo();
    var scIdx = 0, shotIdx = 1, started = false;
    scriptDoc.rows.forEach(function(row){
      if(row.type==='chapter'){ if(started) scIdx++; shotIdx=1; started=true; return; }
      if(!started) started = true;
      row.scene = sceneLabel(scIdx); row.shot = shotLabel(shotIdx++);
    });
  } else {
    pushUndo();
    var sceneOrder = [], seenScenes = {};
    scriptDoc.rows.forEach(function(row){ if(row.type==='chapter')return; var sc=String(row.scene||'__blank__'); if(!seenScenes[sc]){seenScenes[sc]=true;sceneOrder.push(sc);} });
    var counters = {};
    sceneOrder.forEach(function(sc){ counters[sc] = 1; });
    scriptDoc.rows.forEach(function(row){ if(row.type==='chapter')return; var sc=String(row.scene||'__blank__'); row.shot=shotLabel(counters[sc]++); });
  }
  saveDoc(); renderBody();
  showStatus('自動編號完成 ✓', 1500);
  document.getElementById('modalContainer').innerHTML = '';
}

// --- Shot language ---
function insertShot(code){
  var ta = lastFocusedLeftTA;
  if(!ta){ var all = document.querySelectorAll('.cell-ta[data-side="left"]'); if(all.length) ta = all[all.length-1]; }
  if(!ta) return;
  ta.focus();
  var start = ta.selectionStart, end = ta.selectionEnd, val = ta.value;
  var lineStart = val.lastIndexOf('\n', start-1) + 1;
  var lineContent = val.slice(lineStart, end).trim();
  var ins = code + '：';
  if(lineContent){ ins = '\n' + ins; ta.value = val.slice(0,end) + ins + val.slice(end); ta.selectionStart = ta.selectionEnd = end + ins.length; }
  else{ ta.value = val.slice(0,lineStart) + ins + val.slice(end); ta.selectionStart = ta.selectionEnd = lineStart + ins.length; }
  ta.dispatchEvent(new Event('input',{bubbles:true}));
  autoResize(ta);
  showStatus('插入 ' + code, 800);
}

// --- Reference files ---
var FILE_ICONS = {image:'🖼',pdf:'📄',word:'📝',excel:'📊',ppt:'📑',text:'📃',csv:'📋',video:'🎬',audio:'🎵',unknown:'📎'};
function getFileType(mime,name){
  mime=mime||''; var ext=(name||'').split('.').pop().toLowerCase();
  if(mime.startsWith('image/')||['jpg','jpeg','png','gif','webp','svg','bmp'].indexOf(ext)>=0) return 'image';
  if(mime==='application/pdf'||ext==='pdf') return 'pdf';
  if(['doc','docx'].indexOf(ext)>=0||mime.indexOf('wordprocessingml')>=0||mime.indexOf('msword')>=0) return 'word';
  if(['xls','xlsx'].indexOf(ext)>=0||mime.indexOf('spreadsheetml')>=0) return 'excel';
  if(['ppt','pptx'].indexOf(ext)>=0||mime.indexOf('presentationml')>=0) return 'ppt';
  if(['mp4','mov','avi','wmv','mkv','webm'].indexOf(ext)>=0||mime.startsWith('video/')) return 'video';
  if(['mp3','wav','aac','flac','ogg'].indexOf(ext)>=0||mime.startsWith('audio/')) return 'audio';
  if(['txt','md','markdown'].indexOf(ext)>=0||mime.startsWith('text/')) return 'text';
  if(ext==='csv') return 'csv';
  return 'unknown';
}
function formatBytes(n){ if(n<1024)return n+'B'; if(n<1048576)return (n/1024).toFixed(1)+'KB'; return (n/1048576).toFixed(1)+'MB'; }
function refDragOver(e){ e.preventDefault(); document.getElementById('refDropZone').classList.add('drag-over'); }
function refDragLeave(){ document.getElementById('refDropZone').classList.remove('drag-over'); }
function refDrop(e){ e.preventDefault(); document.getElementById('refDropZone').classList.remove('drag-over'); processRefFiles(e.dataTransfer.files); }
function refFilesSelected(e){ processRefFiles(e.target.files); e.target.value=''; }

function processRefFiles(files){
  if(!files||!files.length) return;
  Array.from(files).forEach(function(file){
    var id=uid(), type=getFileType(file.type,file.name);
    var meta={id:id,name:file.name,type:type,size:file.size,mime:file.type,expanded:false};
    var reader=new FileReader();
    if(type==='image'||type==='pdf'){
      reader.onload=function(e){ dbSave(id,e.target.result); refItems.push(meta); saveRefMeta(); renderRefList(); showStatus('已加入：'+file.name); };
      reader.readAsDataURL(file);
    } else if(type==='text'||type==='csv'){
      reader.onload=function(e){ dbSave(id,e.target.result); refItems.push(meta); saveRefMeta(); renderRefList(); showStatus('已加入：'+file.name); };
      reader.readAsText(file,'UTF-8');
    } else if(type==='word'&&typeof JSZip!=='undefined'){
      reader.onload=function(e){
        JSZip.loadAsync(e.target.result).then(function(zip){ var xf=zip.file('word/document.xml'); if(!xf)return Promise.reject(); return xf.async('text'); })
        .then(function(xml){ var xd=new DOMParser().parseFromString(xml,'application/xml'); var texts=[]; xd.querySelectorAll('p').forEach(function(p){ var t=''; p.querySelectorAll('t').forEach(function(t2){t+=t2.textContent;}); if(t.trim())texts.push(t.trim()); }); dbSave(id,'[Word 文字預覽]\n\n'+texts.slice(0,80).join('\n')); refItems.push(meta); saveRefMeta(); renderRefList(); showStatus('已加入：'+file.name); })
        .catch(function(){ dbSave(id,'[無法預覽 Word 內容]'); refItems.push(meta); saveRefMeta(); renderRefList(); });
      };
      reader.readAsArrayBuffer(file);
    } else if(type==='video'){
      dbSave(id,'[影片檔案]\n名稱：'+file.name+'\n大小：'+formatBytes(file.size)+'\n格式：'+file.type+'\n\n影片檔案較大，僅顯示資訊。');
      refItems.push(meta); saveRefMeta(); renderRefList(); showStatus('已加入（影片資訊）：'+file.name);
    } else {
      reader.onload=function(e){ dbSave(id,String(e.target.result||'').slice(0,20000)); refItems.push(meta); saveRefMeta(); renderRefList(); showStatus('已加入：'+file.name); };
      reader.onerror=function(){ dbSave(id,'[無法讀取]'); refItems.push(meta); saveRefMeta(); renderRefList(); };
      reader.readAsText(file,'UTF-8');
    }
  });
}

function renderRefList(){
  var list=document.getElementById('refList'), empty=document.getElementById('refEmpty');
  empty.style.display = refItems.length ? 'none' : 'block';
  Array.from(list.querySelectorAll('.ref-item')).forEach(function(el){ el.parentNode.removeChild(el); });
  refItems.forEach(function(item){
    var icon = FILE_ICONS[item.type]||FILE_ICONS.unknown;
    var div = document.createElement('div'); div.className='ref-item'; div.id='refitem-'+item.id;
    div.innerHTML =
      '<div class="ref-item-header" onclick="toggleRefItem(\''+item.id+'\')">' +
      '<span class="ref-item-icon">'+icon+'</span>' +
      '<span class="ref-item-name" title="'+escHtml(item.name)+'">'+escHtml(item.name)+'</span>' +
      '<span style="font-size:10px;color:#bbb;flex-shrink:0;margin-right:4px">'+formatBytes(item.size)+'</span>' +
      '<button class="ref-item-del" onclick="deleteRefItem(event,\''+item.id+'\')" title="移除">✕</button>' +
      '</div>' +
      '<div class="ref-item-body'+(item.expanded?' open':'')+'\" id="refbody-'+item.id+'"><div style="font-size:11px;color:#999;text-align:center;padding:8px">載入中…</div></div>';
    list.appendChild(div);
    if(item.expanded) loadRefItemContent(item.id, item.type);
  });
}

function toggleRefItem(id){ var item=refItems.find(function(r){return r.id===id;}); if(!item)return; item.expanded=!item.expanded; saveRefMeta(); var body=document.getElementById('refbody-'+id); body.classList.toggle('open',item.expanded); if(item.expanded) loadRefItemContent(id,item.type); }

function loadRefItemContent(id,type){
  var body=document.getElementById('refbody-'+id); if(!body)return;
  dbGet(id).then(function(data){
    if(!data){body.innerHTML='<div style="font-size:11px;color:#bbb;text-align:center;padding:8px">無法載入</div>';return;}
    if(type==='image'){
      body.innerHTML='<img class="ref-img" src="'+data+'" onclick="openRefFullscreen(\''+id+'\')">';
    } else if(type==='pdf'){
      try{
        var base64=data.split(',')[1]||data;
        var binary=atob(base64); var bytes=new Uint8Array(binary.length);
        for(var i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
        var blob=new Blob([bytes],{type:'application/pdf'});
        var blobUrl=URL.createObjectURL(blob);
        body.innerHTML='<div style="margin-bottom:6px;display:flex;gap:8px;align-items:center"><span style="font-size:11px;color:#888">PDF 預覽</span><a href="'+blobUrl+'" target="_blank" style="font-size:11px;color:#185FA5;text-decoration:none;border:1px solid #c5d8f5;border-radius:4px;padding:2px 8px">↗ 新分頁開啟</a></div><iframe class="ref-pdf-frame" src="'+blobUrl+'"></iframe>';
      }catch(err){
        body.innerHTML='<div style="padding:14px;text-align:center"><p style="font-size:12px;color:#888;margin-bottom:10px">無法嵌入預覽</p><button class="primary" style="font-size:12px" onclick="openPdfBlob(\''+id+'\')">↗ 在新分頁開啟 PDF</button></div>';
      }
    } else {
      body.innerHTML='<pre class="ref-text-pre">'+escHtml(String(data).slice(0,8000))+'</pre>';
    }
  });
}
function openPdfBlob(id){ dbGet(id).then(function(data){ if(!data)return; try{ var b64=data.split(',')[1]||data; var bin=atob(b64); var bytes=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); var blob=new Blob([bytes],{type:'application/pdf'}); window.open(URL.createObjectURL(blob),'_blank'); }catch(e){showStatus('無法開啟 PDF',2000);} }); }
function deleteRefItem(e,id){ e.stopPropagation(); if(!confirm('確定移除？'))return; dbDelete(id); refItems=refItems.filter(function(r){return r.id!==id;}); saveRefMeta(); var el=document.getElementById('refitem-'+id); if(el) el.parentNode.removeChild(el); if(!refItems.length) document.getElementById('refEmpty').style.display='block'; showStatus('已移除'); }
function openRefFullscreen(id){ dbGet(id).then(function(data){ if(!data)return; var bg=document.createElement('div'); bg.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:400;display:flex;align-items:center;justify-content:center;cursor:zoom-out'; bg.onclick=function(){document.body.removeChild(bg);}; var img=document.createElement('img'); img.src=data; img.style.cssText='max-width:92vw;max-height:92vh;border-radius:6px'; bg.appendChild(img); document.body.appendChild(bg); }); }

// --- Import ---
function autoDetectRowType(left,right){
  var l=String(left||''), r=String(right||'');
  if(/【[^】]+】/.test(l)||/【[^】]+】/.test(r)||/備[注註]|製作備|製作提醒/.test(l)) return 'note';
  if(/(場次字卡|場景字卡|場景切換|切換|轉場|FADE\s*(IN|OUT|TO)|CUT\s*TO|DISSOLVE)/i.test(l)) return 'scene-cut';
  var rLines=r.split('\n');
  var sfxCount=rLines.filter(function(line){return /^(SFX[:：]|BGM[:：]|音效[:：]|音樂[:：])/i.test(line.trim());}).length;
  var voCount=rLines.filter(function(line){return /^(VO[:：]|旁白[:：])/i.test(line.trim());}).length;
  if((sfxCount>0&&voCount===0)||(/B-ROLL|B ROLL|空鏡|INSERT|CUTAWAY/i.test(l)&&voCount===0)) return 'sfx';
  if(/(ECU|CU[:：\s]|RACK\s*FOCUS|EXTREME\s*CLOSE|重點鏡頭)/i.test(l)) return 'key-shot';
  if(voCount>0&&sfxCount===0&&rLines.length<=3) return 'key-shot';
  return 'normal';
}
function applyAutoType(rows){ return rows.map(function(row){ if(row.type&&row.type!=='normal')return row; return Object.assign({},row,{type:autoDetectRowType(row.left,row.right)}); }); }

function parseMarkdownTable(raw){
  var lines=raw.split('\n'), tableLines=lines.filter(function(l){return /\|/.test(l);});
  if(tableLines.length<2)return null;
  var sepRe=/^[\|\s\-:=]+$/;
  function parseCells(line){var cells=[],re=/\|([^|]*)/g,m;while((m=re.exec(line))!==null)cells.push(m[1].trim());while(cells.length&&cells[cells.length-1]==='')cells.pop();return cells;}
  var headerIdx=-1; for(var i=0;i<tableLines.length;i++){if(!sepRe.test(tableLines[i])){headerIdx=i;break;}}
  if(headerIdx<0)return null;
  var headers=parseCells(tableLines[headerIdx]); if(headers.length<2)return null;
  var leftKW=/(畫面|場景|鏡頭|視覺|image|video)/i, rightKW=/(聲音|旁白|台詞|音效|音樂|VO|SFX|audio|BGM)/i;
  var leftCol=-1,rightCol=-1; headers.forEach(function(h,i){if(leftKW.test(h)&&leftCol<0)leftCol=i;if(rightKW.test(h)&&rightCol<0)rightCol=i;});
  if(leftCol<0)leftCol=0; if(rightCol<0||rightCol===leftCol)rightCol=leftCol===0?1:0;
  function stripMd(s){return String(s||'').replace(/\*\*(.+?)\*\*/g,'$1').replace(/__(.+?)__/g,'$1').replace(/_(.+?)_/g,'$1').replace(/`(.+?)`/g,'$1').replace(/\x3Cbr\s*\/?\x3E/gi,'\n').trim();}
  var rows=[];
  for(var i=headerIdx+1;i<tableLines.length;i++){
    if(sepRe.test(tableLines[i]))continue;
    var cells=parseCells(tableLines[i]); if(!cells.length)continue;
    var left=stripMd(cells[leftCol]||''), right=stripMd(cells[rightCol]||'');
    if(left||right) rows.push({id:uid(),type:'normal',scene:'',shot:'',duration:'',left:left,right:right});

}
function parseKeywordText(raw){
  var lines=raw.split('\n'), leftKW=/^(畫面[:：]|場景[:：]|鏡頭[:：]|視覺[:：])/, rightKW=/^(聲音[:：]|旁白[:：]|VO[:：]|台詞[:：]|SFX[:：]|音效[:：]|音樂[:：]|字卡[:：]|BGM[:：])/;
  var rows=[], cur={id:uid(),type:'normal',scene:'',shot:'',duration:'',left:'',right:''}, has=false, lastSide='left';
  lines.forEach(function(l){
    var lt=l.trim();
    if(!lt){if(has){rows.push(cur);cur={id:uid(),type:'normal',scene:'',shot:'',duration:'',left:'',right:''};has=false;lastSide='left';}return;}
    if(leftKW.test(lt)){cur.left+=(cur.left?'\n':'')+lt.replace(leftKW,'').trim();has=true;lastSide='left';}
    else if(rightKW.test(lt)){cur.right+=(cur.right?'\n':'')+lt.replace(rightKW,'').trim();has=true;lastSide='right';}
    else{if(lastSide==='right')cur.right+='\n'+lt;else cur.left+=(cur.left?'\n':'')+lt;has=true;}
  });
  if(has)rows.push(cur);
  if(!rows.length)return null;
  return {rows:applyAutoType(rows),mode:'keyword'};
}
function parseLooseText(raw){
  var paras=raw.split(/\n\s*\n/).map(function(p){return p.trim();}).filter(Boolean);
  if(!paras.length)return null;
  var rows=[];
  for(var i=0;i<paras.length;i+=2) rows.push({id:uid(),type:'normal',scene:'',shot:'',duration:'',left:paras[i]||'',right:paras[i+1]||''});
  return {rows:applyAutoType(rows),mode:'loose'};
}
function parseTextAuto(raw){
  var md=parseMarkdownTable(raw); if(md)return md;
  var lines=raw.split('\n'), lk=/^(畫面[:：]|場景[:：]|鏡頭[:：]|視覺[:：])/, rk=/^(聲音[:：]|旁白[:：]|VO[:：]|台詞[:：]|SFX[:：]|音效[:：]|音樂[:：]|字卡[:：]|BGM[:：])/;

function importJSONFile(e){
  var file=e.target.files[0]; if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){ try{ var d=JSON.parse(ev.target.result); if(d&&d.rows){ d.rows=d.rows.map(function(r){return Object.assign({type:'normal',scene:'',shot:'',duration:'',chapter:''},r);}); pushUndo(); scriptDoc=d; saveDoc(); renderMeta(); renderBody(); showStatus('JSON 已匯入 ✓'); document.getElementById('modalContainer').innerHTML=''; }else showStatus('JSON 格式錯誤',2000); }catch(ex){showStatus('解析失敗',2000);} };
  reader.readAsText(file);

function importJSONPaste(){
  var raw = document.getElementById('jsonPasteArea').value.trim();
  var statusEl = document.getElementById('jsonPasteStatus');
  if(!raw){ statusEl.textContent = '請先貼上 JSON 代碼'; return; }
  try{
    var d = JSON.parse(raw);
    // 相容多種格式：
    // 1. 標準格式 { title, rows, ... }
    // 2. 只有 rows 陣列 { rows: [...] }
    // 3. 直接是陣列 [{ left, right }, ...]
    if(Array.isArray(d)){
      // 直接是陣列，視為 rows
      d = { title:'', project:'', author:'', version:'v1.0', date:new Date().toLocaleDateString('zh-TW'), notes:'', rows:d };
    }
    if(!d.rows || !Array.isArray(d.rows)){
      statusEl.style.color = '#c0392b';
      statusEl.textContent = '找不到 rows 欄位，請確認 JSON 格式';
      return;
    }
    d.rows = d.rows.map(function(r){
      return Object.assign({id:uid(), type:'normal', scene:'', shot:'', duration:'', chapter:'', left:'', right:''}, r);
    });
    // 補齊文件資訊欄位
    d.title = d.title || '';
    d.project = d.project || '';
    d.author = d.author || '';
    d.version = d.version || 'v1.0';
    d.date = d.date || new Date().toLocaleDateString('zh-TW');
    d.notes = d.notes || '';
    pushUndo();
    scriptDoc = d;
    saveDoc(); renderMeta(); renderBody();
    showStatus('JSON 代碼已匯入，共 ' + d.rows.length + ' 列 ✓', 2000);
    document.getElementById('modalContainer').innerHTML = '';
  }catch(ex){
    statusEl.style.color = '#c0392b';
    statusEl.textContent = '解析失敗：JSON 格式有誤，請檢查代碼';
  }
}

      if(bestT){ var trs=Array.from(bestT.querySelectorAll('tr')),startRow=0; var ft=Array.from(trs[0].querySelectorAll('tc')).map(function(tc){return getXmlText(tc).trim();}); var lkh=/(畫面|場景|鏡頭|視覺|image|video)/i,rkh=/(聲音|旁白|台詞|音效|音樂|vo|sfx|audio|bgm)/i; if(ft.some(function(t){return lkh.test(t)||rkh.test(t);}))startRow=1;
        var lc=0,rc=1; if(startRow===1){ft.forEach(function(t,i){if(lkh.test(t)&&lc===0&&i!==rc)lc=i;if(rkh.test(t)&&rc===1&&i!==lc)rc=i;});}
        for(var i=startRow;i<trs.length;i++){var cells=Array.from(trs[i].querySelectorAll('tc'));var left=cells[lc]?getXmlText(cells[lc]).trim():'';var right=cells[rc]?getXmlText(cells[rc]).trim():'';if(left||right)rows.push({id:uid(),type:'normal',scene:'',shot:'',duration:'',left:left,right:right});}

function showTemplates(){
  document.getElementById('modalContainer').innerHTML =
    '<div class="modal-bg" onclick="closeModal(event)">' +
    '<div class="modal"><button class="modal-close" onclick="document.getElementById(\'modalContainer\').innerHTML=\'\'">✕</button>' +
    '<h2>📋 套用腳本範本</h2>' +
    '<p style="font-size:13px;color:#888;margin-bottom:12px">確定 → 取代全部；取消 → 附加到末尾。</p>' +
    '<div class="template-btns">' +
    Object.entries(TEMPLATES).map(function(kv){return '<button class="primary" onclick="applyTemplate(\''+kv[0]+'\')">'+kv[1].name+'</button>';}).join('') +
    '</div></div></div>';
}
function applyTemplate(key){
  var tpl=TEMPLATES[key]; if(!tpl)return;
  var newRows=tpl.rows.map(function(r){return Object.assign({id:uid(),type:'normal',scene:'',shot:'',duration:'',chapter:''},r);});
  pushUndo();
  if(confirm('套用「'+tpl.name+'」\n確定 → 取代全部\n取消 → 附加到末尾')) scriptDoc.rows=newRows;
  else scriptDoc.rows=scriptDoc.rows.concat(newRows);
  saveDoc(); renderBody(); showStatus('已套用「'+tpl.name+'」'); document.getElementById('modalContainer').innerHTML='';
}

  loadDoc(); loadRefMeta(); loadNote();
  renderMeta(); renderHead(); renderBody(); renderRefList();
  applyColSettings();
  if(colSettings.shotBar) document.getElementById('shotBar').classList.remove('hidden');
});
